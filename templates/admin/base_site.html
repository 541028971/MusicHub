{% extends "admin/base.html" %}

{% block extrahead %}
<style>
    /* Hide default Django header (blue bar + "Django administration") */
    #header {
        display: none !important;
    }

    /* Hide breadcrumbs */
    .breadcrumbs {
        display: none !important;
    }

    /* Hide default Django sidebar search */
    #nav-sidebar,
    .nav-sidebar,
    #sidebar {
        display: none !important;
    }
</style>
{% endblock %}

{% block nav-global %}{% endblock %}
{% block breadcrumbs %}{% endblock %}
{% block title %}{{ block.super }} - MusicHub Admin{% endblock %}
