{% extends "admin/base.html" %}

{% block extrahead %}
<style>
    /* 隐藏 Django 默认的顶部 header（蓝色条 + "Django administration"） */
    #header {
        display: none !important;
    }

    /* 隐藏面包屑 */
    .breadcrumbs {
        display: none !important;
    }

    /* 隐藏 Django 自带侧边搜索栏 */
    #nav-sidebar,
    .nav-sidebar,
    #sidebar {
        display: none !important;
    }
</style>
{% endblock %}

{% block nav-global %}{% endblock %}
{% block breadcrumbs %}{% endblock %}
{% block title %}{{ block.super }} - MusicHub管理中心{% endblock %}
